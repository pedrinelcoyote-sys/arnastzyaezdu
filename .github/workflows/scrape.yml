name: arnastzyaezdu scrape

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      jitter:
        description: 'Espera aleatoria antes de ejecutar (lo usa cron-job.org)'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Timing NO exacto: espera aleatoria 0-4 min (en cron programado o si cron-job.org
      # manda inputs.jitter=true). En "Run workflow" a mano es instantáneo.
      - name: Jitter aleatorio
        if: github.event_name == 'schedule' || github.event.inputs.jitter == 'true'
        run: sleep $(( RANDOM % 240 ))

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Instalar dependencias + Chromium + xvfb
        run: |
          npm install
          npx playwright install --with-deps chromium
          sudo apt-get install -y xvfb

      - name: Ejecutar scraper (headful bajo pantalla virtual)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBSHARE_TOKEN: ${{ secrets.WEBSHARE_TOKEN }}
          PROXIES: ${{ secrets.PROXIES }}
        run: xvfb-run -a node scrape.mjs

      - name: Guardar snapshot y estado de notificados
        if: always()
        run: |
          git config user.name  "metin2-bot"
          git config user.email "bot@users.noreply.github.com"
          git add snapshot.json notified.json health.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "snapshot $(date -u +%FT%TZ)"
            git push
          else
            echo "sin cambios que guardar"
          fi
